blueprint:
  name: SunEnergyXT 500 Serie - Nulleinspeisung mit externem Zähler (Zählertyp-Setup)
  description: >
    Nulleinspeise-Regler für SunEnergyXT 500 / 500 Pro mit einem externen Home
    Assistant-Zähler. Die Automatisierung verwendet keine Betriebsmodus- oder
    Entlademodus-Schalter des Geräts. Wählen Sie den Zählertyp und das
    SunEnergyXT-Gerät; der Blueprint erkennt gängige HA-/HACS-Zählerformen wie
    Shelly, BitShake / Tasmota, EcoTracker, vorzeichenbehaftete Gesamtleistung,
    Dreiphasenleistung sowie Bezug-/Einspeisepaare. Die Automatisierung steuert
    anschließend den Sollwert Leistung Netzanschluss und den Sollwert max.
    Wechselrichterleistung mit derselben Topologielogik wie der Simulator.
  domain: automation
  homeassistant:
    min_version: "2024.6.0"
  source_url: https://github.com/yanqr213/500-blueprint/blob/main/blueprints/automation/sunenergyxt/zero_feed_in_external_meter_meter_type_de.yaml
  input:
    required_devices:
      name: SunEnergyXT-Einrichtung
      icon: mdi:devices
      description: >
        Wählen Sie das SunEnergyXT-All-in-one-Gerät und die wichtigsten
        Benutzereinstellungen. Der Blueprint bindet passende Entitäten dieses
        Geräts automatisch und schreibt die SOC-Grenzen in die Geräteeinstellungen.
      input:
        aio_device:
          name: SunEnergyXT-Gerät
          description: >
            Wählen Sie das SunEnergyXT 500 / 500 Pro Gerät. Der Blueprint sucht
            automatisch den Sollwert Leistung Netzanschluss, den Sollwert max.
            Wechselrichterleistung, die Systemleistung am Lastanschluss, die
            Systemleistung am Netzanschluss, die PV-Gesamteingangsleistung,
            das System-Speicherlevel und die SOC-Grenzentitäten dieses Geräts.
          selector:
            device:
              filter:
                - integration: sunenergyxt

        full_battery_mode:
          name: Verhalten bei voller Batterie
          default: follow_load
          selector:
            select:
              options:
                - label: Nach Vollladung Last folgen
                  value: follow_load
                - label: Nach Vollladung PV folgen
                  value: follow_pv

        gs_max_w:
          name: Maximale Netzeinspeiseleistung
          description: >
            Maximal erlaubte Netzeinspeiseleistung. Verwenden Sie 800 W für
            SunEnergyXT 500 und 2400 W für SunEnergyXT 500 Pro, sofern vor Ort
            kein niedrigerer Grenzwert erforderlich ist.
          default: 2400
          selector:
            number:
              min: 0
              max: 2400
              step: 1
              unit_of_measurement: W
              mode: box

        min_discharge_soc:
          name: System Entladegrenze
          description: >
            Schreibt die System Entladegrenze des ausgewählten SunEnergyXT-
            Geräts. Die Automatisierung verwendet diesen Wert außerdem als
            Steuergrenze bei niedrigem SOC.
          default: 10
          selector:
            number:
              min: 1
              max: 30
              step: 1
              unit_of_measurement: "%"
              mode: box

        max_charge_soc:
          name: System Ladegrenze
          description: >
            Schreibt die System Ladegrenze des ausgewählten SunEnergyXT-Geräts.
            Die Automatisierung verwendet diesen Wert außerdem als Steuergrenze
            bei voller Batterie.
          default: 100
          selector:
            number:
              min: 70
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: box

        ac_couple_max_charge_power_w:
          name: Maximale AC-gekoppelte Ladeleistung
          description: >
            Begrenzt die AC-seitige Lade-/Aufnahmeleistung. SunEnergyXT 500
            und 500 Pro können hier bis zu 2400 W verwenden, sofern vor Ort
            kein niedrigerer Grenzwert gilt.
          default: 2400
          selector:
            number:
              min: 0
              max: 2400
              step: 1
              unit_of_measurement: W
              mode: box

    meter_setup:
      name: Zähler-Einrichtung
      icon: mdi:meter-electric
      description: >
        Wählen Sie genau einen Zählertyp. Home Assistant Blueprints können
        Felder anhand dieser Auswahl nicht dynamisch ausblenden. Öffnen Sie
        daher nur das passende Zählerformular unten und lassen Sie die anderen
        Formulare leer.
      input:
        meter_power_source:
          name: Zählertyp
          description: >
            Wählen Sie die Form der Zählerintegration. Füllen Sie nur die Felder
            aus, die zum ausgewählten Typ passen.
          selector:
            select:
              options:
                - label: Shelly Pro 3EM
                  value: shelly_total_power
                - label: EcoTracker
                  value: ecotracker_power
                - label: BitShake / Tasmota
                  value: bitshake_tasmota_power
                - label: Shelly 3EM
                  value: shelly_three_phase_sum
                - label: Benutzerdefinierter Zähler
                  value: custom

    meter_pro3em_setup:
      name: Shelly Pro 3EM Zähler
      icon: mdi:meter-electric
      collapsed: true
      description: >
        Dieses Formular nur ausfüllen, wenn als Zählertyp Shelly Pro 3EM ausgewählt ist.
      input:
        pro3em_meter_device:
          name: Shelly Pro 3EM Gerät
          description: >
            Wählen Sie das Shelly Pro 3EM Zählergerät.
          default: ""
          selector:
            device:
              entity:
                - domain: sensor

    meter_ecotracker_setup:
      name: EcoTracker-Zähler
      icon: mdi:meter-electric
      collapsed: true
      description: >
        Dieses Formular nur ausfüllen, wenn als Zählertyp EcoTracker ausgewählt ist.
      input:
        ecotracker_meter_device:
          name: EcoTracker-Gerät
          description: >
            Wählen Sie das EcoTracker-Zählergerät.
          default: ""
          selector:
            device:
              entity:
                - domain: sensor

    meter_bitshake_setup:
      name: BitShake-/Tasmota-Zähler
      icon: mdi:meter-electric
      collapsed: true
      description: >
        Dieses Formular nur ausfüllen, wenn als Zählertyp BitShake / Tasmota
        ausgewählt ist.
      input:
        bitshake_meter_device:
          name: BitShake-/Tasmota-Gerät
          description: >
            Wählen Sie das BitShake- oder Tasmota-Zählergerät.
          default: ""
          selector:
            device:
              entity:
                - domain: sensor

    meter_shelly3em_setup:
      name: Shelly-3EM-Zähler
      icon: mdi:meter-electric
      collapsed: true
      description: >
        Dieses Formular nur ausfüllen, wenn als Zählertyp Shelly 3EM ausgewählt
        ist. Wählen Sie die drei Phasengeräte; der Blueprint liest die Leistung
        jeder Phase vom jeweiligen Gerät.
      input:
        meter_l1_device:
          name: Shelly 3EM Phase A / L1 Gerät
          description: >
            Wählen Sie das HA-Gerät für Phase A / L1.
          default: ""
          selector:
            device:
              entity:
                - domain: sensor

        meter_l2_device:
          name: Shelly 3EM Phase B / L2 Gerät
          description: >
            Wählen Sie das HA-Gerät für Phase B / L2.
          default: ""
          selector:
            device:
              entity:
                - domain: sensor

        meter_l3_device:
          name: Shelly 3EM Phase C / L3 Gerät
          description: >
            Wählen Sie das HA-Gerät für Phase C / L3.
          default: ""
          selector:
            device:
              entity:
                - domain: sensor

    meter_custom_setup:
      name: Benutzerdefinierter Zähler
      icon: mdi:meter-electric
      collapsed: true
      description: >
        Dieses Formular nur ausfüllen, wenn als Zählertyp Benutzerdefinierter
        Zähler ausgewählt ist. Ein benutzerdefinierter Zähler benötigt kein
        Zählergerät; wählen Sie eine Formel und geben Sie die passenden
        Entitäten an.
      input:
        custom_meter_formula:
          name: Leistungsformel des benutzerdefinierten Zählers
          description: >
            Der Blueprint wendet diese Formel auf die unten angegebenen Entitäten an.
          default: custom_signed_total_power
          selector:
            select:
              options:
                - label: Vorzeichenbehaftete Gesamtleistung
                  value: custom_signed_total_power
                - label: L1 + L2 + L3
                  value: custom_three_phase_sum
                - label: Einspeisung - Bezug
                  value: import_export_pair
                - label: L1-L3 Einspeisung - Bezug
                  value: custom_three_phase_import_export
                - label: Entitätsattribut
                  value: ecotracker_attribute_power

        meter_power_sensor:
          name: Benutzerdefinierte Gesamt-/Aktualleistungsentität
          description: >
            Für vorzeichenbehaftete Gesamtleistung oder Entitätsattribut verwenden.
          default: ""
          selector:
            entity:
              domain: sensor

        meter_power_attribute:
          name: Benutzerdefiniertes Leistungsattribut
          description: >
            Nur verwenden, wenn die Leistungsformel Entitätsattribut ist. Der
            übliche Attributname ist power.
          default: power
          selector:
            text:

        meter_l1_power_sensor:
          name: Benutzerdefinierte L1-/Phase-A-Leistungsentität
          description: >
            Für die benutzerdefinierte Formel L1 + L2 + L3 verwenden.
          default: ""
          selector:
            entity:
              domain: sensor

        meter_l2_power_sensor:
          name: Benutzerdefinierte L2-/Phase-B-Leistungsentität
          description: >
            Für die benutzerdefinierte Formel L1 + L2 + L3 verwenden.
          default: ""
          selector:
            entity:
              domain: sensor

        meter_l3_power_sensor:
          name: Benutzerdefinierte L3-/Phase-C-Leistungsentität
          description: >
            Für die benutzerdefinierte Formel L1 + L2 + L3 verwenden.
          default: ""
          selector:
            entity:
              domain: sensor

        meter_import_power_sensor:
          name: Benutzerdefinierte Bezugsleistungsentität
          description: >
            Für die benutzerdefinierte Formel Einspeisung - Bezug verwenden.
          default: ""
          selector:
            entity:
              domain: sensor

        meter_export_power_sensor:
          name: Benutzerdefinierte Einspeiseleistungsentität
          description: >
            Für die benutzerdefinierte Formel Einspeisung - Bezug verwenden.
          default: ""
          selector:
            entity:
              domain: sensor

        meter_l1_import_power_sensor:
          name: Benutzerdefinierte L1-/Phase-A-Bezugsleistungsentität
          description: >
            Für die benutzerdefinierte Formel L1-L3 Einspeisung - Bezug verwenden.
          default: ""
          selector:
            entity:
              domain: sensor

        meter_l2_import_power_sensor:
          name: Benutzerdefinierte L2-/Phase-B-Bezugsleistungsentität
          description: >
            Für die benutzerdefinierte Formel L1-L3 Einspeisung - Bezug verwenden.
          default: ""
          selector:
            entity:
              domain: sensor

        meter_l3_import_power_sensor:
          name: Benutzerdefinierte L3-/Phase-C-Bezugsleistungsentität
          description: >
            Für die benutzerdefinierte Formel L1-L3 Einspeisung - Bezug verwenden.
          default: ""
          selector:
            entity:
              domain: sensor

        meter_l1_export_power_sensor:
          name: Benutzerdefinierte L1-/Phase-A-Einspeiseleistungsentität
          description: >
            Für die benutzerdefinierte Formel L1-L3 Einspeisung - Bezug verwenden.
          default: ""
          selector:
            entity:
              domain: sensor

        meter_l2_export_power_sensor:
          name: Benutzerdefinierte L2-/Phase-B-Einspeiseleistungsentität
          description: >
            Für die benutzerdefinierte Formel L1-L3 Einspeisung - Bezug verwenden.
          default: ""
          selector:
            entity:
              domain: sensor

        meter_l3_export_power_sensor:
          name: Benutzerdefinierte L3-/Phase-C-Einspeiseleistungsentität
          description: >
            Für die benutzerdefinierte Formel L1-L3 Einspeisung - Bezug verwenden.
          default: ""
          selector:
            entity:
              domain: sensor

    advanced_entity_overrides:
      name: Erweiterte Entitätsüberschreibungen
      icon: mdi:form-select
      collapsed: true
      description: >
        Für die automatische gerätebasierte Bindung leer lassen. Nur öffnen,
        wenn das ausgewählte Gerät ungewöhnliche Entitätsnamen bereitstellt und
        das automatische Ergebnis falsch ist.
      input:
        gs_number:
          name: Entität für Sollwert Leistung Netzanschluss überschreiben
          default: ""
          selector:
            entity:
              domain: number

        is_number:
          name: Entität für Sollwert max. Wechselrichterleistung überschreiben
          default: ""
          selector:
            entity:
              domain: number

        load_power_sensor:
          name: Sensor für Systemleistung am Lastanschluss überschreiben
          default: ""
          selector:
            entity:
              domain: sensor

        grid_port_power_sensor:
          name: Sensor für Systemleistung am Netzanschluss überschreiben
          default: ""
          selector:
            entity:
              domain: sensor

        pv_power_sensor:
          name: Sensor für PV-Gesamteingangsleistung überschreiben
          default: ""
          selector:
            entity:
              domain: sensor

        soc_sensor:
          name: Sensor für System-Speicherlevel überschreiben
          default: ""
          selector:
            entity:
              domain: sensor

        min_discharge_soc_number:
          name: Number-Entität für System Entladegrenze überschreiben
          default: ""
          selector:
            entity:
              domain: number

        max_charge_soc_number:
          name: Number-Entität für System Ladegrenze überschreiben
          default: ""
          selector:
            entity:
              domain: number

    advanced_meter_settings:
      name: Erweiterte Zähler-Vorzeichen- und Einheitseinstellungen
      icon: mdi:meter-electric
      collapsed: true
      input:
        meter_sign_mode:
          name: Vorzeichenkonvention des Zählers
          description: >
            Automatisch verwendet die Vorgabe des ausgewählten Zählertyps. Wählen
            Sie eine feste Vorgabe, wenn Stromwandler, Skript oder Template das
            entgegengesetzte Vorzeichen liefern.
          default: auto_from_preset
          selector:
            select:
              options:
                - label: Automatisch nach ausgewähltem Zählertyp
                  value: auto_from_preset
                - label: Einspeisung ist positiv
                  value: export_positive
                - label: Netzbezug ist positiv
                  value: import_positive

        meter_power_multiplier:
          name: Leistungsfaktor externer Zähler
          description: >
            1 verwenden, wenn die Entität bereits W liefert. 1000 verwenden, wenn die Entität kW liefert.
          default: 1
          selector:
            number:
              min: 0.001
              max: 1000
              step: 0.001
              mode: box

    advanced_control_settings:
      name: Erweiterte Steuerungseinstellungen
      icon: mdi:cog-outline
      collapsed: true
      input:
        target_grid_power_w:
          name: Ziel-Netzleistung
          description: >
            Nulleinspeisung verwendet 0 W. Positive Werte halten bewusst eine
            kleine Einspeisung; negative Werte halten bewusst einen kleinen Bezug.
          default: 0
          selector:
            number:
              min: -200
              max: 200
              step: 1
              unit_of_measurement: W
              mode: box

        gs_min_w:
          name: Untere Grenze für Sollwert Leistung Netzanschluss
          description: >
            Minimal erlaubter Sollwert Leistung Netzanschluss. Negative Werte
            erlauben Netzbezug bzw. Laden, um Überschussleistung aufzunehmen.
          default: -2400
          selector:
            number:
              min: -2400
              max: 0
              step: 1
              unit_of_measurement: W
              mode: box

        gs_resolution_w:
          name: Schreibauflösung Sollwert Leistung Netzanschluss
          default: 1
          selector:
            number:
              min: 1
              max: 50
              step: 1
              unit_of_measurement: W
              mode: box

        gain_percent:
          name: Korrekturverstärkung
          default: 100
          selector:
            number:
              min: 20
              max: 150
              step: 5
              unit_of_measurement: "%"
              mode: slider

        small_error_w:
          name: Schwelle für kleinen Fehler
          default: 30
          selector:
            number:
              min: 1
              max: 300
              step: 1
              unit_of_measurement: W
              mode: box

        large_error_w:
          name: Schwelle für großen Fehler
          default: 150
          selector:
            number:
              min: 10
              max: 1000
              step: 10
              unit_of_measurement: W
              mode: box

        slow_interval_s:
          name: Langsames Schreibintervall
          default: 7
          selector:
            number:
              min: 1
              max: 120
              step: 0.5
              unit_of_measurement: s
              mode: box

        medium_interval_s:
          name: Mittleres Schreibintervall
          default: 2.5
          selector:
            number:
              min: 0.5
              max: 60
              step: 0.5
              unit_of_measurement: s
              mode: box

        fast_interval_s:
          name: Schnelles Schreibintervall
          default: 1
          selector:
            number:
              min: 1
              max: 20
              step: 1
              unit_of_measurement: s
              mode: box

        gs_feedback_settle_s:
          name: Einschwingzeit der Regelungsrückmeldung
          description: >
            Mindestzeit nach dem Schreiben des Sollwerts Leistung Netzanschluss
            oder des Sollwerts max. Wechselrichterleistung bis zum nächsten
            Schreibvorgang. Die Automatisierung wartet außerdem auf neue
            Netzanschluss- und Zählerwerte nach der letzten Änderung. Der
            Standardwert passt zur beobachteten SunEnergyXT-Rückmeldezeit und
            reduziert Schwingen bei Änderungen externer Geräte.
          default: 5
          selector:
            number:
              min: 1
              max: 30
              step: 1
              unit_of_measurement: s
              mode: box

        small_max_step_w:
          name: Maximale Anpassung bei kleinem Fehler
          default: 20
          selector:
            number:
              min: 1
              max: 300
              step: 1
              unit_of_measurement: W
              mode: box

        medium_max_step_w:
          name: Maximale Anpassung bei mittlerem Fehler
          default: 120
          selector:
            number:
              min: 10
              max: 1000
              step: 10
              unit_of_measurement: W
              mode: box

        fast_max_step_w:
          name: Maximale Anpassung bei großem Fehler
          default: 450
          selector:
            number:
              min: 50
              max: 2400
              step: 10
              unit_of_measurement: W
              mode: box

        max_meter_age_s:
          name: Maximales Alter der Messwerte
          description: >
            Maximales Alter der Zähler- und Gerätewerte. Der Standard erlaubt
            Zählern wie Shelly Pro 3EM, unveränderte 0-W-Phasensensoren stehen
            zu lassen, ohne die Regelung zu blockieren.
          default: 30
          selector:
            number:
              min: 2
              max: 300
              step: 1
              unit_of_measurement: s
              mode: box

        is_resolution_w:
          name: Schreibauflösung Sollwert max. Wechselrichterleistung
          default: 10
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: W
              mode: box

        diagnostic_log_level:
          name: Diagnose-Log-Stufe
          description: >
            Aus schreibt keine Diagnose-Logs. Ereignisse protokolliert
            SOC-Haltewechsel. Schreibvorgänge ergänzt Setpoint-Schreibvorgänge.
            Entscheidungen ergänzt periodische Regelentscheidungen. Debug
            schreibt Entscheidungs-Logs alle 5 Sekunden.
          default: off
          selector:
            select:
              options:
                - label: "Aus"
                  value: "off"
                - label: "Ereignisse"
                  value: "events"
                - label: "Schreibvorgänge"
                  value: "write"
                - label: "Entscheidungen"
                  value: "decision"
                - label: "Debug"
                  value: "debug"

        diagnostic_log_interval_s:
          name: Intervall für Entscheidungs-Logs
          description: >
            Mindestintervall für periodische Entscheidungs-Logs. Debug-
            Entscheidungs-Logs verwenden ein festes Intervall von 5 s.
            Ereignis- und Schreib-Logs werden nur ausgegeben, wenn die
            jeweilige Aktion tatsächlich passiert.
          default: 60
          selector:
            number:
              min: 10
              max: 3600
              step: 10
              unit_of_measurement: s
              mode: box

        full_charge_hold_helper:
          name: Optionaler Helper für Haltezustand volle Batterie
          description: >
            Optional. Leer lassen, außer die Automatisierung soll den Haltezustand
            volle Batterie über Neustarts hinweg speichern. Ohne diesen Helper
            leitet die Automatisierung den Zustand direkt aus dem aktuellen SOC ab.
          default: ""
          selector:
            entity:
              domain: input_boolean

        low_discharge_hold_helper:
          name: Optionaler Helper für Niedrig-SOC-Haltezustand
          description: >
            Optional. Leer lassen, außer die Automatisierung soll den Niedrig-SOC-
            Haltezustand über Neustarts hinweg speichern. Ohne diesen Helper
            leitet die Automatisierung den Zustand direkt aus dem aktuellen SOC ab.
          default: ""
          selector:
            entity:
              domain: input_boolean

mode: single
max_exceeded: silent

trigger:
  - platform: time_pattern
    seconds: "/1"

variables:
  aio_device: !input aio_device
  pro3em_meter_device: !input pro3em_meter_device
  ecotracker_meter_device: !input ecotracker_meter_device
  bitshake_meter_device: !input bitshake_meter_device
  meter_l1_device: !input meter_l1_device
  meter_l2_device: !input meter_l2_device
  meter_l3_device: !input meter_l3_device
  meter_power_source: !input meter_power_source
  custom_meter_formula: !input custom_meter_formula
  meter_entity_override: !input meter_power_sensor
  meter_power_attribute: !input meter_power_attribute
  meter_l1_entity_override: !input meter_l1_power_sensor
  meter_l2_entity_override: !input meter_l2_power_sensor
  meter_l3_entity_override: !input meter_l3_power_sensor
  meter_import_entity_override: !input meter_import_power_sensor
  meter_export_entity_override: !input meter_export_power_sensor
  meter_l1_import_entity_override: !input meter_l1_import_power_sensor
  meter_l2_import_entity_override: !input meter_l2_import_power_sensor
  meter_l3_import_entity_override: !input meter_l3_import_power_sensor
  meter_l1_export_entity_override: !input meter_l1_export_power_sensor
  meter_l2_export_entity_override: !input meter_l2_export_power_sensor
  meter_l3_export_entity_override: !input meter_l3_export_power_sensor
  meter_sign_mode: !input meter_sign_mode
  meter_power_multiplier: !input meter_power_multiplier
  external_meter_device: >-
    {% set source = meter_power_source | trim %}
    {% if source == 'shelly_total_power' %}
      {{ pro3em_meter_device | string | trim }}
    {% elif source == 'ecotracker_power' %}
      {{ ecotracker_meter_device | string | trim }}
    {% elif source == 'bitshake_tasmota_power' %}
      {{ bitshake_meter_device | string | trim }}
    {% else %}
      {{ '' }}
    {% endif %}
  effective_meter_power_source: >-
    {% if meter_power_source | trim == 'custom' %}
      {{ custom_meter_formula | trim }}
    {% else %}
      {{ meter_power_source | trim }}
    {% endif %}
  gs_entity_override: !input gs_number
  is_entity_override: !input is_number
  load_entity_override: !input load_power_sensor
  gp_entity_override: !input grid_port_power_sensor
  pv_entity_override: !input pv_power_sensor
  soc_entity_override: !input soc_sensor
  min_soc_entity_override: !input min_discharge_soc_number
  max_soc_entity_override: !input max_charge_soc_number
  full_hold_entity: !input full_charge_hold_helper
  low_hold_entity: !input low_discharge_hold_helper
