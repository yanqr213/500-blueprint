        {% set interval = 5 if level == 'debug' else ([diagnostic_log_interval_s | float(60), 10] | max) %}
        {% set now_ts = as_timestamp(now()) | int(0) %}
        {{ level in ['decision', 'debug']
           and (now_ts % (interval | int(60))) == 0 }}

  - choose:
      - conditions:
          - condition: template
            value_template: >-
              {{ has_full_hold_helper | bool(false)
                 and full_hold_state | bool(false)
                 and not (current_full_hold_state | bool(false)) }}
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ (diagnostic_log_level | string | trim) in ['events', 'write', 'decision', 'debug'] }}
                sequence:
                  - service: system_log.write
                    data:
                      level: info
                      message: >-
                        SunEnergyXT zero feed-in | event=full_hold_on | soc={{ soc_value | float(0) | round(1) }}% | lower={{ effective_min_discharge_soc | float(0) }}% | upper={{ effective_max_charge_soc | float(0) }}% | meter={{ normalized_grid_w | float(0) | round(0) }}W | gp={{ gp_power_w | float(0) | round(0) }}W | lp={{ load_power_w | float(0) | round(0) }}W | pv={{ pv_power_w | float(0) | round(0) }}W
          - service: input_boolean.turn_on
            target:
              entity_id: "{{ full_hold_entity | trim }}"
      - conditions:
          - condition: template
            value_template: >-
              {{ has_full_hold_helper | bool(false)
                 and not (full_hold_state | bool(false))
                 and current_full_hold_state | bool(false) }}
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ (diagnostic_log_level | string | trim) in ['events', 'write', 'decision', 'debug'] }}
                sequence:
                  - service: system_log.write
                    data:
                      level: info
                      message: >-
                        SunEnergyXT zero feed-in | event=full_hold_off | soc={{ soc_value | float(0) | round(1) }}% | lower={{ effective_min_discharge_soc | float(0) }}% | upper={{ effective_max_charge_soc | float(0) }}% | meter={{ normalized_grid_w | float(0) | round(0) }}W | gp={{ gp_power_w | float(0) | round(0) }}W | lp={{ load_power_w | float(0) | round(0) }}W | pv={{ pv_power_w | float(0) | round(0) }}W
          - service: input_boolean.turn_off
            target:
              entity_id: "{{ full_hold_entity | trim }}"

  - choose:
      - conditions:
          - condition: template
            value_template: >-
              {{ has_low_hold_helper | bool(false)
                 and low_hold_state | bool(false)
                 and not (current_low_hold_state | bool(false)) }}
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ (diagnostic_log_level | string | trim) in ['events', 'write', 'decision', 'debug'] }}
                sequence:
                  - service: system_log.write
                    data:
                      level: info
                      message: >-
                        SunEnergyXT zero feed-in | event=low_hold_on | soc={{ soc_value | float(0) | round(1) }}% | lower={{ effective_min_discharge_soc | float(0) }}% | upper={{ effective_max_charge_soc | float(0) }}% | meter={{ normalized_grid_w | float(0) | round(0) }}W | gp={{ gp_power_w | float(0) | round(0) }}W | lp={{ load_power_w | float(0) | round(0) }}W | pv={{ pv_power_w | float(0) | round(0) }}W
          - service: input_boolean.turn_on
            target:
              entity_id: "{{ low_hold_entity | trim }}"
      - conditions:
          - condition: template
            value_template: >-
              {{ has_low_hold_helper | bool(false)
                 and not (low_hold_state | bool(false))
                 and current_low_hold_state | bool(false) }}
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ (diagnostic_log_level | string | trim) in ['events', 'write', 'decision', 'debug'] }}
                sequence:
                  - service: system_log.write
                    data:
                      level: info
                      message: >-
                        SunEnergyXT zero feed-in | event=low_hold_off | soc={{ soc_value | float(0) | round(1) }}% | lower={{ effective_min_discharge_soc | float(0) }}% | upper={{ effective_max_charge_soc | float(0) }}% | meter={{ normalized_grid_w | float(0) | round(0) }}W | gp={{ gp_power_w | float(0) | round(0) }}W | lp={{ load_power_w | float(0) | round(0) }}W | pv={{ pv_power_w | float(0) | round(0) }}W
          - service: input_boolean.turn_off
            target:
              entity_id: "{{ low_hold_entity | trim }}"

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ should_write_is }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ (diagnostic_log_level | string | trim) in ['write', 'decision', 'debug'] }}
                sequence:
                  - service: system_log.write
                    data:
                      level: info
                      message: >-
                        SunEnergyXT zero feed-in | event=write_is | old={{ current_is_w | float(0) | round(0) }}W | new={{ next_is_w | float(0) | round(0) }}W | target={{ target_is_w | float(0) | round(0) }}W | meter={{ normalized_grid_w | float(0) | round(0) }}W | gp={{ gp_power_w | float(0) | round(0) }}W | lp={{ load_power_w | float(0) | round(0) }}W | pv={{ pv_power_w | float(0) | round(0) }}W | soc={{ soc_value | float(0) | round(1) }}% | full_hold={{ full_hold_state | bool(false) }} | low_hold={{ low_hold_state | bool(false) }}
          - service: number.set_value
            continue_on_error: true
            target:
              entity_id: "{{ is_entity | trim }}"
            data:
              value: "{{ next_is_w }}"

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ should_write_gs }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ (diagnostic_log_level | string | trim) in ['write', 'decision', 'debug'] }}
                sequence:
                  - service: system_log.write
                    data:
                      level: info
                      message: >-
                        SunEnergyXT zero feed-in | event=write_gs | old={{ current_gs_w | float(0) | round(0) }}W | new={{ next_gs_w | float(0) | round(0) }}W | target={{ target_gs_w | float(0) | round(0) }}W | meter={{ normalized_grid_w | float(0) | round(0) }}W | gp={{ gp_power_w | float(0) | round(0) }}W | lp={{ load_power_w | float(0) | round(0) }}W | pv={{ pv_power_w | float(0) | round(0) }}W | soc={{ soc_value | float(0) | round(1) }}% | full_hold={{ full_hold_state | bool(false) }} | low_hold={{ low_hold_state | bool(false) }}
          - service: number.set_value
            target:
              entity_id: "{{ gs_entity | trim }}"
            data:
              value: "{{ next_gs_w }}"

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ diagnostic_decision_log_due | bool(false) }}"
        sequence:
          - service: system_log.write
            data:
              level: info
              message: >-
                SunEnergyXT zero feed-in | event=decision | meter={{ normalized_grid_w | float(0) | round(0) }}W | target_grid={{ target_grid_power_w | float(0) | round(0) }}W | gp={{ gp_power_w | float(0) | round(0) }}W | lp={{ load_power_w | float(0) | round(0) }}W | pv={{ pv_power_w | float(0) | round(0) }}W | soc={{ soc_value | float(0) | round(1) }}% | gs={{ current_gs_w | float(0) | round(0) }}W->{{ next_gs_w | float(0) | round(0) }}W | is={{ current_is_w | float(0) | round(0) }}W->{{ next_is_w | float(0) | round(0) }}W | write_gs={{ should_write_gs | bool(false) }} | write_is={{ should_write_is | bool(false) }} | full_hold={{ full_hold_state | bool(false) }} | low_hold={{ low_hold_state | bool(false) }} | bypass={{ bypass_only | bool(false) }}
