condition:
  - condition: template
    value_template: >-
      {% set source = meter_power_source %}
      {% set bad = ['unknown', 'unavailable', 'none', ''] %}
      {% set signed_sources = [
        'shelly_total_power',
        'bitshake_tasmota_power',
        'ecotracker_power',
        'custom_signed_total_power'
      ] %}
      {% set phase_sources = [
        'shelly_three_phase_sum',
        'custom_three_phase_sum'
      ] %}
      {% set phase_pair_sources = [
        'shelly_three_phase_import_export',
        'custom_three_phase_import_export'
      ] %}
      {% if source in signed_sources %}
        {{ meter_entity | string | length > 0 and states(meter_entity | trim) not in bad }}
      {% elif source == 'ecotracker_attribute_power' %}
        {{ meter_entity | string | length > 0
           and states(meter_entity | trim) not in bad
           and state_attr(meter_entity | trim, meter_power_attribute) is not none }}
      {% elif source in phase_sources %}
        {{ meter_l1_entity | string | length > 0 and states(meter_l1_entity | trim) not in bad
           and meter_l2_entity | string | length > 0 and states(meter_l2_entity | trim) not in bad
           and meter_l3_entity | string | length > 0 and states(meter_l3_entity | trim) not in bad }}
      {% elif source == 'import_export_pair' %}
        {{ meter_import_entity | string | length > 0 and states(meter_import_entity | trim) not in bad
           and meter_export_entity | string | length > 0 and states(meter_export_entity | trim) not in bad }}
      {% elif source in phase_pair_sources %}
        {{ meter_l1_import_entity | string | length > 0 and states(meter_l1_import_entity | trim) not in bad
           and meter_l2_import_entity | string | length > 0 and states(meter_l2_import_entity | trim) not in bad
           and meter_l3_import_entity | string | length > 0 and states(meter_l3_import_entity | trim) not in bad
           and meter_l1_export_entity | string | length > 0 and states(meter_l1_export_entity | trim) not in bad
           and meter_l2_export_entity | string | length > 0 and states(meter_l2_export_entity | trim) not in bad
           and meter_l3_export_entity | string | length > 0 and states(meter_l3_export_entity | trim) not in bad }}
      {% else %}
        {{ false }}
      {% endif %}
  - condition: template
    value_template: >-
      {{ states(gs_entity | trim) not in ['unknown', 'unavailable', 'none', ''] }}
  - condition: template
    value_template: >-
      {{ states(is_entity | trim) not in ['unknown', 'unavailable', 'none', ''] }}
  - condition: template
    value_template: >-
      {{ states(load_entity | trim) not in ['unknown', 'unavailable', 'none', ''] }}
  - condition: template
    value_template: >-
      {{ states(gp_entity | trim) not in ['unknown', 'unavailable', 'none', ''] }}
  - condition: template
    value_template: >-
      {{ states(pv_entity | trim) not in ['unknown', 'unavailable', 'none', ''] }}
  - condition: template
    value_template: >-
      {{ states(soc_entity | trim) not in ['unknown', 'unavailable', 'none', ''] }}
  - condition: template
    value_template: >-
      {% set source = meter_power_source %}
      {% set limit = max_meter_age_s | float(30) %}
      {% set signed_sources = [
        'shelly_total_power',
        'bitshake_tasmota_power',
        'ecotracker_power',
        'ecotracker_attribute_power',
        'custom_signed_total_power'
      ] %}
      {% set phase_sources = [
        'shelly_three_phase_sum',
        'custom_three_phase_sum'
      ] %}
      {% set phase_pair_sources = [
        'shelly_three_phase_import_export',
        'custom_three_phase_import_export'
      ] %}
      {% if source in signed_sources %}
        {{ meter_entity | string | length > 0
           and (as_timestamp(now()) - as_timestamp(states[meter_entity | trim].last_updated, 0)) <= limit }}
      {% elif source in phase_sources %}
        {{ meter_l1_entity | string | length > 0
           and meter_l2_entity | string | length > 0
           and meter_l3_entity | string | length > 0
           and (as_timestamp(now()) - as_timestamp(states[meter_l1_entity | trim].last_updated, 0)) <= limit
           and (as_timestamp(now()) - as_timestamp(states[meter_l2_entity | trim].last_updated, 0)) <= limit
           and (as_timestamp(now()) - as_timestamp(states[meter_l3_entity | trim].last_updated, 0)) <= limit }}
      {% elif source == 'import_export_pair' %}
        {{ meter_import_entity | string | length > 0
           and meter_export_entity | string | length > 0
           and (as_timestamp(now()) - as_timestamp(states[meter_import_entity | trim].last_updated, 0)) <= limit
           and (as_timestamp(now()) - as_timestamp(states[meter_export_entity | trim].last_updated, 0)) <= limit }}
      {% elif source in phase_pair_sources %}
        {{ meter_l1_import_entity | string | length > 0
           and meter_l2_import_entity | string | length > 0
           and meter_l3_import_entity | string | length > 0
           and meter_l1_export_entity | string | length > 0
           and meter_l2_export_entity | string | length > 0
           and meter_l3_export_entity | string | length > 0
           and (as_timestamp(now()) - as_timestamp(states[meter_l1_import_entity | trim].last_updated, 0)) <= limit
           and (as_timestamp(now()) - as_timestamp(states[meter_l2_import_entity | trim].last_updated, 0)) <= limit
           and (as_timestamp(now()) - as_timestamp(states[meter_l3_import_entity | trim].last_updated, 0)) <= limit
           and (as_timestamp(now()) - as_timestamp(states[meter_l1_export_entity | trim].last_updated, 0)) <= limit
           and (as_timestamp(now()) - as_timestamp(states[meter_l2_export_entity | trim].last_updated, 0)) <= limit
           and (as_timestamp(now()) - as_timestamp(states[meter_l3_export_entity | trim].last_updated, 0)) <= limit }}
      {% else %}
        {{ false }}
      {% endif %}
  - condition: template
    value_template: >-
      {% set age = as_timestamp(now()) - as_timestamp(states[load_entity | trim].last_updated, 0) %}
      {{ age <= (max_meter_age_s | float(30)) }}
  - condition: template
    value_template: >-
      {% set age = as_timestamp(now()) - as_timestamp(states[gp_entity | trim].last_updated, 0) %}
      {{ age <= (max_meter_age_s | float(30)) }}
  - condition: template
    value_template: >-
      {% set age = as_timestamp(now()) - as_timestamp(states[pv_entity | trim].last_updated, 0) %}
      {{ age <= (max_meter_age_s | float(30)) }}
  - condition: template
    value_template: >-
      {% set age = as_timestamp(now()) - as_timestamp(states[soc_entity | trim].last_updated, 0) %}
      {{ age <= (max_meter_age_s | float(30)) }}

action:
  - variables:
      meter_signed_total_sources:
        - shelly_total_power
        - bitshake_tasmota_power
        - ecotracker_power
        - custom_signed_total_power
      meter_phase_sum_sources:
        - shelly_three_phase_sum
        - custom_three_phase_sum
      meter_phase_pair_sources:
        - shelly_three_phase_import_export
        - custom_three_phase_import_export
      meter_import_positive_presets:
        - shelly_total_power
        - shelly_three_phase_sum
        - bitshake_tasmota_power
        - ecotracker_power
        - ecotracker_attribute_power
      meter_raw_power_before_multiplier_w: >-
        {% set source = meter_power_source %}
        {% if source in meter_signed_total_sources %}
          {{ states(meter_entity | trim) | float(0) }}
        {% elif source == 'ecotracker_attribute_power' %}
          {{ state_attr(meter_entity | trim, meter_power_attribute) | float(0) }}
        {% elif source in meter_phase_sum_sources %}
          {{ (states(meter_l1_entity | trim) | float(0))
             + (states(meter_l2_entity | trim) | float(0))
             + (states(meter_l3_entity | trim) | float(0)) }}
        {% elif source == 'import_export_pair' %}
          {{ (states(meter_export_entity | trim) | float(0))
             - (states(meter_import_entity | trim) | float(0)) }}
        {% elif source in meter_phase_pair_sources %}
          {{ (states(meter_l1_export_entity | trim) | float(0))
             + (states(meter_l2_export_entity | trim) | float(0))
             + (states(meter_l3_export_entity | trim) | float(0))
             - (states(meter_l1_import_entity | trim) | float(0))
             - (states(meter_l2_import_entity | trim) | float(0))
             - (states(meter_l3_import_entity | trim) | float(0)) }}
        {% else %}
          {{ 0 }}
        {% endif %}
      meter_raw_w: >-
        {{ (meter_raw_power_before_multiplier_w | float(0))
           * (meter_power_multiplier | float(1)) }}
      effective_meter_sign_mode: >-
        {% if meter_power_source == 'import_export_pair' or meter_power_source in meter_phase_pair_sources %}
          {{ 'export_positive' }}
        {% elif meter_sign_mode == 'auto_from_preset' %}
          {% if meter_power_source in meter_import_positive_presets %}
            {{ 'import_positive' }}
          {% else %}
            {{ 'export_positive' }}
          {% endif %}
        {% else %}
          {{ meter_sign_mode }}
        {% endif %}
      meter_factor: >-
        {{ 1 if (effective_meter_sign_mode | trim) == 'export_positive' else -1 }}
      current_gs_w: "{{ states(gs_entity | trim) | float(0) }}"
      inverter_rated_w: 2400
      has_soc: >-
        {{ soc_entity | string | length > 0
           and states(soc_entity | trim) not in ['unknown', 'unavailable', 'none', ''] }}
      has_is: >-
        {{ is_entity | string | length > 0
           and states(is_entity | trim) not in ['unknown', 'unavailable', 'none', ''] }}
      has_load: >-
        {{ load_entity | string | length > 0
           and states(load_entity | trim) not in ['unknown', 'unavailable', 'none', ''] }}
      has_gp: >-
        {{ gp_entity | string | length > 0
           and states(gp_entity | trim) not in ['unknown', 'unavailable', 'none', ''] }}
      has_pv: >-
        {{ pv_entity | string | length > 0
           and states(pv_entity | trim) not in ['unknown', 'unavailable', 'none', ''] }}

  - variables:
      normalized_grid_w: >-
        {{ (meter_raw_w | float(0)) * (meter_factor | float(1)) }}
      soc_value: >-
        {% if has_soc | bool(false) %}
          {{ states(soc_entity | trim) | float(50) }}
        {% else %}
          {{ 50 }}
        {% endif %}
      current_is_w: >-
        {% if has_is | bool(false) %}
          {{ states(is_entity | trim) | float(0) }}
        {% else %}
          {{ 0 }}
        {% endif %}
      load_power_w: >-
        {% if has_load | bool(false) %}
          {{ states(load_entity | trim) | float(0) }}
        {% else %}
          {{ 0 }}
        {% endif %}
      gp_power_w: >-
        {% if has_gp | bool(false) %}
          {{ states(gp_entity | trim) | float(0) }}
        {% else %}
          {{ 0 }}
        {% endif %}
      pv_power_w: >-
        {% if has_pv | bool(false) %}
          {{ states(pv_entity | trim) | float(0) }}
        {% else %}
          {{ 0 }}
        {% endif %}

  - variables:
      soc_hysteresis_value: "{{ [soc_hysteresis | float(2), 0] | max }}"
      has_full_hold_helper: >-
        {{ full_hold_entity | string | trim | length > 0 }}
      has_low_hold_helper: >-
        {{ low_hold_entity | string | trim | length > 0 }}
      current_full_hold_state: >-
        {{ has_full_hold_helper | bool(false)
           and is_state(full_hold_entity | trim, 'on') }}
      current_low_hold_state: >-
        {{ has_low_hold_helper | bool(false)
           and is_state(low_hold_entity | trim, 'on') }}
      state_mismatch_threshold_w: "{{ [small_error_w | float(30), 30] | max }}"
      full_hold_state: >-
        {% set soc = soc_value | float(50) %}
        {% set upper = max_charge_soc | float(100) %}
        {% set release = upper - (soc_hysteresis_value | float(2)) %}
        {% if soc >= upper %}
          {{ true }}
        {% elif soc <= release %}
          {{ false }}
        {% elif not (has_full_hold_helper | bool(false)) %}
          {{ false }}
        {% else %}
          {{ current_full_hold_state | bool(false) }}
        {% endif %}
      low_hold_state_prelim: >-
        {% set soc = soc_value | float(50) %}
        {% set lower = min_discharge_soc | float(10) %}
        {% set release = lower + (soc_hysteresis_value | float(2)) %}
        {% if soc <= lower %}
          {{ true }}
        {% elif soc >= release %}
          {{ false }}
        {% elif not (has_low_hold_helper | bool(false)) %}
          {{ false }}
        {% else %}
          {{ current_low_hold_state | bool(false) }}
        {% endif %}

  - variables:
      control_error_w: >-
        {{ (normalized_grid_w | float(0)) - (target_grid_power_w | float(0)) }}
      positive_load_power_w: >-
        {{ [load_power_w | float(0), 0] | max }}
      load_port_backfeed_w: >-
        {{ [(-1 * (load_power_w | float(0))), 0] | max }}
      effective_load_power_w: >-
        {{ load_power_w | float(0) if has_load | bool(false) else 0 }}
      hardware_output_limit_w: >-
        {% if full_battery_mode == 'follow_pv'
              and full_hold_state | bool(false)
              and has_pv | bool(false) %}
          {{ inverter_rated_w | float(2400) }}
        {% else %}
          {{ [current_is_w | float(0), inverter_rated_w | float(2400)] | min }}
        {% endif %}
      load_port_from_inverter_w: >-
        {% if full_battery_mode == 'follow_pv'
              and full_hold_state | bool(false)
              and has_pv | bool(false) %}
          {{ [positive_load_power_w | float(0), inverter_rated_w | float(2400)] | min }}
        {% else %}
          {{ [positive_load_power_w | float(0), [current_is_w | float(0), inverter_rated_w | float(2400)] | min] | min }}
        {% endif %}
      load_port_grid_supply_w: >-
        {% if full_battery_mode == 'follow_pv'
              and full_hold_state | bool(false)
              and has_pv | bool(false) %}
          {{ [(positive_load_power_w | float(0)) - ([positive_load_power_w | float(0), inverter_rated_w | float(2400)] | min), 0] | max }}
        {% else %}
          {{ [(positive_load_power_w | float(0)) - ([positive_load_power_w | float(0), [current_is_w | float(0), inverter_rated_w | float(2400)] | min] | min), 0] | max }}
        {% endif %}
      estimated_home_load_w: >-
        {{ (gp_power_w | float(0)) - (normalized_grid_w | float(0)) - (load_port_grid_supply_w | float(0)) }}

  - variables:
      load_grid_supply_target_w: >-
        {% if (positive_load_power_w | float(0)) > 0 %}
          {{ [[(target_grid_power_w | float(0)) - (estimated_home_load_w | float(0)), 0] | max, positive_load_power_w | float(0)] | min }}
        {% else %}
          {{ 0 }}
        {% endif %}
      raw_grid_port_target_w: >-
        {% if (load_port_backfeed_w | float(0)) > 0 %}
          {{ (target_grid_power_w | float(0)) + (estimated_home_load_w | float(0)) }}
        {% else %}
          {{ (target_grid_power_w | float(0)) + (estimated_home_load_w | float(0)) + (load_grid_supply_target_w | float(0)) }}
        {% endif %}
      desired_load_port_output_w: >-
        {% if (positive_load_power_w | float(0)) > 0 %}
          {{ (positive_load_power_w | float(0)) - (load_grid_supply_target_w | float(0)) }}
        {% else %}
          {{ 0 }}
        {% endif %}
      bypass_active: >-
        {{ full_battery_mode == 'follow_pv'
           and full_hold_state | bool(false)
           and has_pv | bool(false) }}
      bypass_grid_available_w: >-
        {% if full_battery_mode == 'follow_pv'
              and full_hold_state | bool(false)
              and has_pv | bool(false) %}
          {% set pv_after_load = [(pv_power_w | float(0)) - (positive_load_power_w | float(0)), 0] | max %}
          {{ [[pv_after_load + (load_port_backfeed_w | float(0)), 0] | max, gs_max_w | float(2400)] | min }}
        {% else %}
          {{ 0 }}
        {% endif %}
      bypass_only_candidate: >-
        {{ bypass_active | bool(false)
           and ([raw_grid_port_target_w | float(0), 0] | max) <= (bypass_grid_available_w | float(0)) }}
      bypass_feedback_missing: >-
        {% set threshold = state_mismatch_threshold_w | float(30) %}
        {% set required_gp = [raw_grid_port_target_w | float(0), 0] | max %}
        {{ bypass_active | bool(false)
           and required_gp > threshold
           and (gp_power_w | float(0)) < (required_gp - threshold)
           and (normalized_grid_w | float(0)) < ((target_grid_power_w | float(0)) - threshold) }}
      bypass_only: >-
        {{ bypass_only_candidate | bool(false) and not (bypass_feedback_missing | bool(false)) }}
      raw_is_target_w: >-
        {{ (desired_load_port_output_w | float(0)) + ([raw_grid_port_target_w | float(0), 0] | max) }}
      pre_soc_target_is_w: >-
        {% if bypass_only | bool(false) %}
          {{ current_is_w | float(0) }}
        {% else %}
          {{ raw_is_target_w | float(0) }}
        {% endif %}

  - variables:
      low_hold_state: "{{ low_hold_state_prelim | bool(false) }}"
      charge_blocked_by_soc: >-
        {{ full_hold_state | bool(false) }}
      discharge_blocked_by_soc: >-
        {{ low_hold_state | bool(false) }}
      needs_grid_absorption: >-
        {{ ((target_grid_power_w | float(0)) + (estimated_home_load_w | float(0))) < 0 }}

  - variables:
      charge_limited_gs_min_w: >-
        {% set configured_min = gs_min_w | float(-2400) %}
        {{ [configured_min, -1 * (ac_couple_max_charge_power_w | float(2400))] | max }}
      effective_gs_min_w: >-
        {% set configured_min = charge_limited_gs_min_w | float(-2400) %}
        {% if bypass_only | bool(false) %}
          {{ 0 }}
        {% elif (load_port_backfeed_w | float(0)) > 0 and not (needs_grid_absorption | bool(false)) %}
          {{ [configured_min, 0] | max }}
        {% elif charge_blocked_by_soc | bool(false) %}
          {{ [configured_min, 0] | max }}
        {% else %}
          {{ configured_min }}
        {% endif %}
      effective_gs_max_w: >-
        {% set configured_max = gs_max_w | float(2400) %}
        {% if bypass_only | bool(false) %}
          {{ 0 }}
        {% elif discharge_blocked_by_soc | bool(false) %}
          {{ [configured_max, 0] | min }}
        {% else %}
          {{ configured_max }}
        {% endif %}

  - variables:
      unbounded_target_gs_w: >-
        {% if bypass_only | bool(false) %}
          {{ 0 }}
        {% else %}
          {{ raw_grid_port_target_w | float(0) }}
        {% endif %}
      target_gs_w: >-
        {% set low = effective_gs_min_w | float(-2400) %}
        {% set high = effective_gs_max_w | float(2400) %}
        {{ [[unbounded_target_gs_w | float(0), low] | max, high] | min }}
      unclamped_target_is_w: >-
        {% if bypass_only | bool(false) %}
          {{ current_is_w | float(0) }}
        {% elif discharge_blocked_by_soc | bool(false) %}
          {{ [pre_soc_target_is_w | float(0), pv_power_w | float(0)] | min }}
        {% else %}
          {{ pre_soc_target_is_w | float(0) }}
        {% endif %}
      target_is_w: >-
        {{ [[unclamped_target_is_w | float(0), 0] | max, inverter_rated_w | float(2400)] | min }}
      gs_error_w: >-
        {{ (target_gs_w | float(0)) - (current_gs_w | float(0)) }}
      is_error_w: >-
        {{ (target_is_w | float(0)) - (current_is_w | float(0)) }}
      overall_abs_error_w: >-
        {{ [control_error_w | float(0) | abs,
            is_error_w | float(0) | abs,
            gs_error_w | float(0) | abs] | max }}
      required_interval_s: >-
        {% if (overall_abs_error_w | float(0)) >= (large_error_w | float(150)) %}
          {{ fast_interval_s | float(1) }}
        {% elif (overall_abs_error_w | float(0)) >= (small_error_w | float(30)) %}
          {{ medium_interval_s | float(5) }}
        {% else %}
          {{ slow_interval_s | float(15) }}
        {% endif %}
      proportional_delta_w: >-
        {{ (gs_error_w | float(0)) * (gain_percent | float(100)) / 100 }}
      next_is_w: >-
        {% set resolution = [is_resolution_w | float(10), 1] | max %}
        {% set rounded = (((target_is_w | float(0)) / resolution) | round(0) * resolution) | float(0) %}
        {{ [[rounded, 0] | max, inverter_rated_w | float(2400)] | min | round(0) }}
      seconds_since_is_change: >-
        {% if has_is | bool(false) %}
          {{ as_timestamp(now()) - as_timestamp(states[is_entity | trim].last_changed, 0) }}
        {% else %}
          {{ 0 }}
        {% endif %}

  - variables:
      should_write_is: >-
        {{ not (bypass_only | bool(false))
           and (seconds_since_is_change | float(999)) >= (required_interval_s | float(1))
           and ((next_is_w | float(0)) - (current_is_w | float(0))) | abs >= (is_resolution_w | float(10)) }}

  - variables:
      max_adjustment_w: >-
        {% if (overall_abs_error_w | float(0)) >= (large_error_w | float(150)) %}
          {{ fast_max_step_w | float(500) }}
        {% elif (overall_abs_error_w | float(0)) >= (small_error_w | float(30)) %}
          {{ medium_max_step_w | float(100) }}
        {% else %}
          {{ small_max_step_w | float(20) }}
        {% endif %}

  - variables:
      limited_delta_w: >-
        {% set delta = proportional_delta_w | float(0) %}
        {% set limit = max_adjustment_w | float(20) %}
        {{ [[delta, -limit] | max, limit] | min }}

  - variables:
      stepped_target_gs_w: "{{ (current_gs_w | float(0)) + (limited_delta_w | float(0)) }}"

  - variables:
      next_gs_w: >-
        {% set resolution = [gs_resolution_w | float(1), 1] | max %}
        {% set rounded = (((stepped_target_gs_w | float(0)) / resolution) | round(0) * resolution) | float(0) %}
        {% set low = effective_gs_min_w | float(-2400) %}
        {% set high = effective_gs_max_w | float(2400) %}
        {{ [[rounded, low] | max, high] | min | round(0) }}

  - variables:
      seconds_since_gs_change: >-
        {{ as_timestamp(now()) - as_timestamp(states[gs_entity | trim].last_changed, 0) }}

  - variables:
      should_write_gs: >-
        {{ (seconds_since_gs_change | float(999)) >= (required_interval_s | float(1))
           and (next_gs_w | float(0)) != (current_gs_w | float(0)) }}

  - choose:
      - conditions:
          - condition: template
            value_template: >-
              {{ has_full_hold_helper | bool(false)
                 and full_hold_state | bool(false)
                 and not (current_full_hold_state | bool(false)) }}
        sequence:
          - service: input_boolean.turn_on
            target:
              entity_id: "{{ full_hold_entity | trim }}"
      - conditions:
          - condition: template
            value_template: >-
              {{ has_full_hold_helper | bool(false)
                 and not (full_hold_state | bool(false))
                 and current_full_hold_state | bool(false) }}
        sequence:
          - service: input_boolean.turn_off
            target:
              entity_id: "{{ full_hold_entity | trim }}"

  - choose:
      - conditions:
          - condition: template
            value_template: >-
              {{ has_low_hold_helper | bool(false)
                 and low_hold_state | bool(false)
                 and not (current_low_hold_state | bool(false)) }}
        sequence:
          - service: input_boolean.turn_on
            target:
              entity_id: "{{ low_hold_entity | trim }}"
      - conditions:
          - condition: template
            value_template: >-
              {{ has_low_hold_helper | bool(false)
                 and not (low_hold_state | bool(false))
                 and current_low_hold_state | bool(false) }}
        sequence:
          - service: input_boolean.turn_off
            target:
              entity_id: "{{ low_hold_entity | trim }}"

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ should_write_is }}"
        sequence:
          - service: number.set_value
            target:
              entity_id: "{{ is_entity | trim }}"
            data:
              value: "{{ next_is_w }}"

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ should_write_gs }}"
        sequence:
          - service: number.set_value
            target:
              entity_id: "{{ gs_entity | trim }}"
            data:
              value: "{{ next_gs_w }}"
