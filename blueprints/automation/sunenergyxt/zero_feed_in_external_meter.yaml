blueprint:
  name: SunEnergyXT 500 Series - External Meter Zero Feed-in
  description: >
    Zero feed-in controller for SunEnergyXT 500 / 500 Pro using an external Home
    Assistant meter. It does not use MM or MD. Choose a preset for common HA /
    HACS meter integrations such as Shelly, BitShake / Tasmota, and
    EcoTracker, or use a custom signed-total, three-phase, import/export, or
    three-phase import/export configuration. The automation then controls the
    SunEnergyXT GS setpoint and IS output limit with the same topology logic
    used by the simulator.
  domain: automation
  homeassistant:
    min_version: "2024.6.0"
  source_url: https://github.com/yanqr213/500-blueprint/blob/main/blueprints/automation/sunenergyxt/zero_feed_in_external_meter.yaml
  input:
    required_devices:
      name: Devices
      icon: mdi:devices
      description: >
        Select the SunEnergyXT all-in-one device and the external meter device.
        The blueprint will auto-bind the matching entities from those devices.
      input:
        aio_device:
          name: SunEnergyXT device
          description: >
            Select the SunEnergyXT 500 / 500 Pro device. The blueprint will
            auto-find GS, IS, LP, GP, PV, and SC from this device.
          selector:
            device:
              filter:
                - integration: sunenergyxt

        external_meter_device:
          name: External meter device
          description: >
            Select the external Home Assistant meter device, such as Shelly,
            BitShake / Tasmota, EcoTracker, or another meter integration.
          selector:
            device:
              entity:
                - domain: sensor

        meter_power_source:
          name: External meter preset
          description: >
            Choose the preset that matches the entities exposed by the external
            meter device. Manual entity overrides are available in advanced
            settings if auto-binding picks the wrong sensor.
          default: shelly_total_power
          selector:
            select:
              options:
                - label: Shelly EM / Pro EM / Pro 3EM total power
                  value: shelly_total_power
                - label: Shelly 3EM / Pro 3EM L1 + L2 + L3
                  value: shelly_three_phase_sum
                - label: Shelly 3EM / Pro 3EM L1-L3 import/export
                  value: shelly_three_phase_import_export
                - label: BitShake / Tasmota current power
                  value: bitshake_tasmota_power
                - label: EcoTracker current power entity
                  value: ecotracker_power
                - label: EcoTracker raw entity attribute
                  value: ecotracker_attribute_power
                - label: Custom signed total power
                  value: custom_signed_total_power
                - label: Custom L1 + L2 + L3 phase sum
                  value: custom_three_phase_sum
                - label: Custom import/export power pair
                  value: import_export_pair
                - label: Custom L1-L3 import/export pair
                  value: custom_three_phase_import_export

    basic_targets:
      name: Basic targets
      icon: mdi:tune
      input:
        target_grid_power_w:
          name: Target grid power
          description: >
            Zero feed-in uses 0 W. Positive values intentionally keep a small
            export; negative values intentionally keep a small import.
          default: 0
          selector:
            number:
              min: -200
              max: 200
              step: 1
              unit_of_measurement: W
              mode: box

        gs_max_w:
          name: Maximum on-grid output power
          description: >
            Maximum allowed on-grid output power. Use 800 for SunEnergyXT 500
            and 2400 for SunEnergyXT 500 Pro unless a stricter local limit is
            required.
          default: 2400
          selector:
            number:
              min: 0
              max: 2400
              step: 1
              unit_of_measurement: W
              mode: box

        full_battery_mode:
          name: Full-battery behavior
          default: follow_load
          selector:
            select:
              options:
                - label: Follow load after full
                  value: follow_load
                - label: Follow PV after full
                  value: follow_pv

    advanced_entity_overrides:
      name: Advanced entity overrides
      icon: mdi:form-select
      collapsed: true
      description: >
        Leave these blank for automatic device-based binding. Expand only if the
        selected device exposes unusual entity names and the auto-bind result is
        wrong.
      input:
        gs_number:
          name: Override GS number entity
          default: ""
          selector:
            entity:
              domain: number

        is_number:
          name: Override IS number entity
          default: ""
          selector:
            entity:
              domain: number

        load_power_sensor:
          name: Override load-port power sensor
          default: ""
          selector:
            entity:
              domain: sensor

        grid_port_power_sensor:
          name: Override grid-port power sensor
          default: ""
          selector:
            entity:
              domain: sensor

        pv_power_sensor:
          name: Override PV power sensor
          default: ""
          selector:
            entity:
              domain: sensor

        soc_sensor:
          name: Override SOC sensor
          default: ""
          selector:
            entity:
              domain: sensor

        meter_power_sensor:
          name: Override meter total/current power sensor
          default: ""
          selector:
            entity:
              domain: sensor

        meter_l1_power_sensor:
          name: Override meter L1 power sensor
          default: ""
          selector:
            entity:
              domain: sensor

        meter_l2_power_sensor:
          name: Override meter L2 power sensor
          default: ""
          selector:
            entity:
              domain: sensor

        meter_l3_power_sensor:
          name: Override meter L3 power sensor
          default: ""
          selector:
            entity:
              domain: sensor

        meter_import_power_sensor:
          name: Override meter import power sensor
          default: ""
          selector:
            entity:
              domain: sensor

        meter_export_power_sensor:
          name: Override meter export power sensor
          default: ""
          selector:
            entity:
              domain: sensor

        meter_l1_import_power_sensor:
          name: Override meter L1 import power sensor
          default: ""
          selector:
            entity:
              domain: sensor

        meter_l2_import_power_sensor:
          name: Override meter L2 import power sensor
          default: ""
          selector:
            entity:
              domain: sensor

        meter_l3_import_power_sensor:
          name: Override meter L3 import power sensor
          default: ""
          selector:
            entity:
              domain: sensor

        meter_l1_export_power_sensor:
          name: Override meter L1 export power sensor
          default: ""
          selector:
            entity:
              domain: sensor

        meter_l2_export_power_sensor:
          name: Override meter L2 export power sensor
          default: ""
          selector:
            entity:
              domain: sensor

        meter_l3_export_power_sensor:
          name: Override meter L3 export power sensor
          default: ""
          selector:
            entity:
              domain: sensor

    advanced_meter_settings:
      name: Advanced meter settings
      icon: mdi:meter-electric
      collapsed: true
      input:
        meter_power_attribute:
          name: External meter power attribute
          description: >
            Only used by the EcoTracker raw entity attribute preset. The usual
            attribute name is power.
          default: power
          selector:
            text:

        meter_sign_mode:
          name: Meter sign convention
          description: >
            Auto uses the preset default. Use an explicit override if your CT
            direction, script, or template reports the opposite sign.
          default: auto_from_preset
          selector:
            select:
              options:
                - label: Auto from selected preset
                  value: auto_from_preset
                - label: Export/feed-in is positive
                  value: export_positive
                - label: Import/grid consumption is positive
                  value: import_positive

        meter_power_multiplier:
          name: External meter power multiplier
          description: >
            Use 1 when the entity is already W. Use 1000 when the entity is kW.
          default: 1
          selector:
            number:
              min: 0.001
              max: 1000
              step: 0.001
              mode: box

    advanced_control_settings:
      name: Advanced control settings
      icon: mdi:cog-outline
      collapsed: true
      input:
        gs_min_w:
          name: GS lower limit
          description: >
            Minimum GS command. Negative values allow grid import / charging to
            absorb surplus power.
          default: -2400
          selector:
            number:
              min: -2400
              max: 0
              step: 1
              unit_of_measurement: W
              mode: box

        gs_resolution_w:
          name: GS write resolution
          default: 1
          selector:
            number:
              min: 1
              max: 50
              step: 1
              unit_of_measurement: W
              mode: box

        gain_percent:
          name: Correction gain
          default: 100
          selector:
            number:
              min: 20
              max: 150
              step: 5
              unit_of_measurement: "%"
              mode: slider

        small_error_w:
          name: Small-error threshold
          default: 30
          selector:
            number:
              min: 1
              max: 300
              step: 1
              unit_of_measurement: W
              mode: box

        large_error_w:
          name: Large-error threshold
          default: 150
          selector:
            number:
              min: 10
              max: 1000
              step: 10
              unit_of_measurement: W
              mode: box

        slow_interval_s:
          name: Slow write interval
          default: 15
          selector:
            number:
              min: 3
              max: 120
              step: 1
              unit_of_measurement: s
              mode: box

        medium_interval_s:
          name: Medium write interval
          default: 5
          selector:
            number:
              min: 1
              max: 60
              step: 1
              unit_of_measurement: s
              mode: box

        fast_interval_s:
          name: Fast write interval
          default: 1
          selector:
            number:
              min: 1
              max: 20
              step: 1
              unit_of_measurement: s
              mode: box

        small_max_step_w:
          name: Small-error max adjustment
          default: 20
          selector:
            number:
              min: 1
              max: 300
              step: 1
              unit_of_measurement: W
              mode: box

        medium_max_step_w:
          name: Medium-error max adjustment
          default: 100
          selector:
            number:
              min: 10
              max: 1000
              step: 10
              unit_of_measurement: W
              mode: box

        fast_max_step_w:
          name: Large-error max adjustment
          default: 500
          selector:
            number:
              min: 50
              max: 2400
              step: 10
              unit_of_measurement: W
              mode: box

        max_meter_age_s:
          name: Maximum meter age
          default: 8
          selector:
            number:
              min: 2
              max: 300
              step: 1
              unit_of_measurement: s
              mode: box

        min_discharge_soc:
          name: SOC lower limit
          default: 10
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: box

        max_charge_soc:
          name: SOC upper limit
          default: 100
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: box

        soc_hysteresis:
          name: SOC hysteresis
          default: 2
          selector:
            number:
              min: 0
              max: 20
              step: 1
              unit_of_measurement: "%"
              mode: box

        ac_couple_max_charge_power_w:
          name: AC-coupled maximum charge power
          default: 2400
          selector:
            number:
              min: 0
              max: 2400
              step: 1
              unit_of_measurement: W
              mode: box

        is_resolution_w:
          name: IS write resolution
          default: 10
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: W
              mode: box

        full_charge_hold_helper:
          name: Optional full-charge hold helper
          description: >
            Optional. Leave blank unless you want the automation to remember
            full-charge hold state across restarts. Without this helper, the
            automation derives full-charge hold directly from current SOC.
          default: ""
          selector:
            entity:
              domain: input_boolean

        low_discharge_hold_helper:
          name: Optional low-SOC hold helper
          description: >
            Optional. Leave blank unless you want the automation to remember
            low-SOC hold state across restarts. Without this helper, the
            automation derives low-SOC hold directly from current SOC.
          default: ""
          selector:
            entity:
              domain: input_boolean

mode: single
max_exceeded: silent

trigger:
  - platform: time_pattern
    seconds: "/1"

variables:
  aio_device: !input aio_device
  external_meter_device: !input external_meter_device
  meter_power_source: !input meter_power_source
  meter_entity_override: !input meter_power_sensor
  meter_power_attribute: !input meter_power_attribute
  meter_l1_entity_override: !input meter_l1_power_sensor
  meter_l2_entity_override: !input meter_l2_power_sensor
  meter_l3_entity_override: !input meter_l3_power_sensor
  meter_import_entity_override: !input meter_import_power_sensor
  meter_export_entity_override: !input meter_export_power_sensor
  meter_l1_import_entity_override: !input meter_l1_import_power_sensor
  meter_l2_import_entity_override: !input meter_l2_import_power_sensor
  meter_l3_import_entity_override: !input meter_l3_import_power_sensor
  meter_l1_export_entity_override: !input meter_l1_export_power_sensor
  meter_l2_export_entity_override: !input meter_l2_export_power_sensor
  meter_l3_export_entity_override: !input meter_l3_export_power_sensor
  meter_sign_mode: !input meter_sign_mode
  meter_power_multiplier: !input meter_power_multiplier
  gs_entity_override: !input gs_number
  is_entity_override: !input is_number
  load_entity_override: !input load_power_sensor
  gp_entity_override: !input grid_port_power_sensor
  pv_entity_override: !input pv_power_sensor
  soc_entity_override: !input soc_sensor
  full_hold_entity: !input full_charge_hold_helper
  low_hold_entity: !input low_discharge_hold_helper
  full_battery_mode: !input full_battery_mode
  target_grid_power_w: !input target_grid_power_w
  gs_min_w: !input gs_min_w
  gs_max_w: !input gs_max_w
  gs_resolution_w: !input gs_resolution_w
  gain_percent: !input gain_percent
  small_error_w: !input small_error_w
  large_error_w: !input large_error_w
  slow_interval_s: !input slow_interval_s
  medium_interval_s: !input medium_interval_s
  fast_interval_s: !input fast_interval_s
  small_max_step_w: !input small_max_step_w
  medium_max_step_w: !input medium_max_step_w
  fast_max_step_w: !input fast_max_step_w
  max_meter_age_s: !input max_meter_age_s
  min_discharge_soc: !input min_discharge_soc
  max_charge_soc: !input max_charge_soc
  soc_hysteresis: !input soc_hysteresis
  ac_couple_max_charge_power_w: !input ac_couple_max_charge_power_w
  is_resolution_w: !input is_resolution_w
  gs_entity: >-
    {% set override = gs_entity_override | string %}
    {% if override | length > 0 %}
      {{ override | trim }}
    {% else %}
      {% set ns = namespace(entity='') %}
      {% for entity in device_entities(aio_device) if ns.entity == '' and entity.startswith('number.') %}
        {% set name = (state_attr(entity, 'friendly_name') or entity) | lower %}
        {% set eid = entity | lower %}
        {% if eid.endswith('_gs') or 'grid port power setpoint' in name or '市电口功率设定' in name or ('netzanschluss' in name and 'sollwert' in name) %}
          {% set ns.entity = entity %}
        {% endif %}
      {% endfor %}
      {{ ns.entity | trim }}
    {% endif %}
  is_entity: >-
    {% set override = is_entity_override | string %}
    {% if override | length > 0 %}
      {{ override | trim }}
    {% else %}
      {% set ns = namespace(entity='') %}
      {% for entity in device_entities(aio_device) if ns.entity == '' and entity.startswith('number.') %}
        {% set name = (state_attr(entity, 'friendly_name') or entity) | lower %}
        {% set eid = entity | lower %}
        {% if eid.endswith('_is') or 'max inverter power setpoint' in name or '最大逆变功率设定' in name or 'wechselrichterleistung' in name %}
          {% set ns.entity = entity %}
        {% endif %}
      {% endfor %}
      {{ ns.entity | trim }}
    {% endif %}
  load_entity: >-
    {% set override = load_entity_override | string %}
    {% if override | length > 0 %}
      {{ override | trim }}
    {% else %}
      {% set ns = namespace(entity='') %}
      {% for entity in device_entities(aio_device) if ns.entity == '' and entity.startswith('sensor.') %}
        {% set name = (state_attr(entity, 'friendly_name') or entity) | lower %}
        {% set eid = entity | lower %}
        {% if eid.endswith('_lp') or 'load port power' in name or '负载口功率' in name or 'lastanschluss' in name %}
          {% set ns.entity = entity %}
        {% endif %}
      {% endfor %}
      {{ ns.entity | trim }}
    {% endif %}
  gp_entity: >-
    {% set override = gp_entity_override | string %}
    {% if override | length > 0 %}
      {{ override | trim }}
    {% else %}
      {% set ns = namespace(entity='') %}
      {% for entity in device_entities(aio_device) if ns.entity == '' and entity.startswith('sensor.') %}
        {% set name = (state_attr(entity, 'friendly_name') or entity) | lower %}
        {% set eid = entity | lower %}
        {% if eid.endswith('_gp') or 'grid port power' in name or '并网口功率' in name or ('netzanschluss' in name and 'leistung' in name) %}
          {% set ns.entity = entity %}
        {% endif %}
      {% endfor %}
      {{ ns.entity | trim }}
    {% endif %}
  pv_entity: >-
    {% set override = pv_entity_override | string %}
    {% if override | length > 0 %}
      {{ override | trim }}
    {% else %}
      {% set ns = namespace(entity='') %}
      {% for entity in device_entities(aio_device) if ns.entity == '' and entity.startswith('sensor.') %}
        {% set name = (state_attr(entity, 'friendly_name') or entity) | lower %}
        {% set eid = entity | lower %}
        {% if eid.endswith('_pv') or 'pv total input power' in name or 'pv总输入功率' in name or 'pv-gesamteingangsleistung' in name %}
          {% set ns.entity = entity %}
        {% endif %}
      {% endfor %}
      {{ ns.entity | trim }}
    {% endif %}
  soc_entity: >-
    {% set override = soc_entity_override | string %}
    {% if override | length > 0 %}
      {{ override | trim }}
    {% else %}
      {% set ns = namespace(entity='') %}
      {% for entity in device_entities(aio_device) if ns.entity == '' and entity.startswith('sensor.') %}
        {% set name = (state_attr(entity, 'friendly_name') or entity) | lower %}
        {% set eid = entity | lower %}
        {% if eid.endswith('_sc') or 'battery level' in name or '系统总电量' in name or 'speicherlevel' in name %}
          {% set ns.entity = entity %}
        {% endif %}
      {% endfor %}
      {{ ns.entity | trim }}
    {% endif %}
  meter_entity: >-
    {% set override = meter_entity_override | string %}
    {% if override | length > 0 %}
      {{ override | trim }}
    {% else %}
      {% set ns = namespace(entity='') %}
      {% for entity in device_entities(external_meter_device) if ns.entity == '' and entity.startswith('sensor.') %}
        {% set name = (state_attr(entity, 'friendly_name') or entity) | lower %}
        {% set eid = entity | lower %}
        {% set unit = (state_attr(entity, 'unit_of_measurement') or '') | lower %}
        {% set dc = (state_attr(entity, 'device_class') or '') | lower %}
        {% set is_power = dc == 'power' or unit in ['w', 'kw'] or 'power' in name or 'leistung' in name %}
        {% set is_excluded = 'energy' in name or 'voltage' in name or 'current' in name or '电量' in name or '电压' in name or '电流' in name or 'energie' in name or 'spannung' in name or 'strom' in name %}
        {% set is_phase = ' l1' in name or ' l2' in name or ' l3' in name or '_l1' in eid or '_l2' in eid or '_l3' in eid or 'phase' in name %}
        {% set is_pair = 'import' in name or 'export' in name or 'returned' in name or 'consumption' in name or 'feed' in name %}
        {% if is_power and not is_excluded and not is_phase and not is_pair %}
          {% set ns.entity = entity %}
        {% endif %}
      {% endfor %}
      {% if ns.entity == '' %}
        {% for entity in device_entities(external_meter_device) if ns.entity == '' and entity.startswith('sensor.') %}
          {% set unit = (state_attr(entity, 'unit_of_measurement') or '') | lower %}
          {% set dc = (state_attr(entity, 'device_class') or '') | lower %}
          {% if dc == 'power' or unit in ['w', 'kw'] %}
            {% set ns.entity = entity %}
          {% endif %}
        {% endfor %}
      {% endif %}
      {{ ns.entity | trim }}
    {% endif %}
  meter_l1_entity: >-
    {% set override = meter_l1_entity_override | string %}
    {% if override | length > 0 %}
      {{ override | trim }}
    {% else %}
      {% set ns = namespace(entity='') %}
      {% for entity in device_entities(external_meter_device) if ns.entity == '' and entity.startswith('sensor.') %}
        {% set name = (state_attr(entity, 'friendly_name') or entity) | lower %}
        {% set eid = entity | lower %}
        {% set unit = (state_attr(entity, 'unit_of_measurement') or '') | lower %}
        {% set dc = (state_attr(entity, 'device_class') or '') | lower %}
        {% if (dc == 'power' or unit in ['w', 'kw'] or 'power' in name or 'leistung' in name) and ('l1' in name or '_l1' in eid or 'phase a' in name) and not ('import' in name or 'export' in name or 'returned' in name or 'consumption' in name) %}
          {% set ns.entity = entity %}
        {% endif %}
      {% endfor %}
      {{ ns.entity | trim }}
    {% endif %}
  meter_l2_entity: >-
    {% set override = meter_l2_entity_override | string %}
    {% if override | length > 0 %}
      {{ override | trim }}
    {% else %}
      {% set ns = namespace(entity='') %}
      {% for entity in device_entities(external_meter_device) if ns.entity == '' and entity.startswith('sensor.') %}
        {% set name = (state_attr(entity, 'friendly_name') or entity) | lower %}
        {% set eid = entity | lower %}
        {% set unit = (state_attr(entity, 'unit_of_measurement') or '') | lower %}
        {% set dc = (state_attr(entity, 'device_class') or '') | lower %}
        {% if (dc == 'power' or unit in ['w', 'kw'] or 'power' in name or 'leistung' in name) and ('l2' in name or '_l2' in eid or 'phase b' in name) and not ('import' in name or 'export' in name or 'returned' in name or 'consumption' in name) %}
          {% set ns.entity = entity %}
        {% endif %}
      {% endfor %}
      {{ ns.entity | trim }}
    {% endif %}
  meter_l3_entity: >-
    {% set override = meter_l3_entity_override | string %}
    {% if override | length > 0 %}
      {{ override | trim }}
    {% else %}
      {% set ns = namespace(entity='') %}
      {% for entity in device_entities(external_meter_device) if ns.entity == '' and entity.startswith('sensor.') %}
        {% set name = (state_attr(entity, 'friendly_name') or entity) | lower %}
        {% set eid = entity | lower %}
        {% set unit = (state_attr(entity, 'unit_of_measurement') or '') | lower %}
        {% set dc = (state_attr(entity, 'device_class') or '') | lower %}
        {% if (dc == 'power' or unit in ['w', 'kw'] or 'power' in name or 'leistung' in name) and ('l3' in name or '_l3' in eid or 'phase c' in name) and not ('import' in name or 'export' in name or 'returned' in name or 'consumption' in name) %}
          {% set ns.entity = entity %}
        {% endif %}
      {% endfor %}
      {{ ns.entity | trim }}
    {% endif %}
  meter_import_entity: >-
    {% set override = meter_import_entity_override | string %}
    {% if override | length > 0 %}
      {{ override | trim }}
    {% else %}
      {% set ns = namespace(entity='') %}
      {% for entity in device_entities(external_meter_device) if ns.entity == '' and entity.startswith('sensor.') %}
        {% set name = (state_attr(entity, 'friendly_name') or entity) | lower %}
        {% set unit = (state_attr(entity, 'unit_of_measurement') or '') | lower %}
        {% set dc = (state_attr(entity, 'device_class') or '') | lower %}
        {% if (dc == 'power' or unit in ['w', 'kw'] or 'power' in name or 'leistung' in name) and ('import' in name or 'consumption' in name or 'grid in' in name) and not ('l1' in name or 'l2' in name or 'l3' in name or 'phase' in name) %}
          {% set ns.entity = entity %}
        {% endif %}
      {% endfor %}
      {{ ns.entity | trim }}
    {% endif %}
  meter_export_entity: >-
    {% set override = meter_export_entity_override | string %}
    {% if override | length > 0 %}
      {{ override | trim }}
    {% else %}
      {% set ns = namespace(entity='') %}
      {% for entity in device_entities(external_meter_device) if ns.entity == '' and entity.startswith('sensor.') %}
        {% set name = (state_attr(entity, 'friendly_name') or entity) | lower %}
        {% set unit = (state_attr(entity, 'unit_of_measurement') or '') | lower %}
        {% set dc = (state_attr(entity, 'device_class') or '') | lower %}
